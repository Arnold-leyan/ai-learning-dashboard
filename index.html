<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>樂衍 AI 學習儀表板</title>
<style>
  :root{
    --bg:#0f172a; --panel:#ffffff; --ink:#1e293b; --muted:#64748b;
    --line:#e2e8f0; --brand:#2563eb; --brand2:#7c3aed;
    --ok:#16a34a; --warn:#f59e0b; --bad:#ef4444; --soft:#f1f5f9;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Microsoft JhengHei","Segoe UI",system-ui,sans-serif;
       color:var(--ink);background:#f8fafc;font-size:14px}
  header{background:linear-gradient(120deg,#1e3a8a,#6d28d9);color:#fff;padding:20px 28px}
  header h1{margin:0;font-size:22px;font-weight:700;letter-spacing:.5px}
  header .meta{margin-top:6px;font-size:12.5px;opacity:.85}
  .wrap{max-width:1280px;margin:0 auto;padding:20px 24px 60px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
       box-shadow:0 1px 3px rgba(15,23,42,.04)}
  .kpi .v{font-size:28px;font-weight:800;line-height:1}
  .kpi .l{color:var(--muted);font-size:12.5px;margin-top:7px}
  .kpi .s{font-size:11.5px;color:var(--muted);margin-top:2px}
  .bar{height:8px;border-radius:99px;background:var(--soft);overflow:hidden;margin-top:10px}
  .bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#2563eb,#7c3aed)}

  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{padding:8px 11px;border:1px solid var(--line);border-radius:9px;
       font-size:13.5px;background:#fff;color:var(--ink)}
  .toolbar input{min-width:200px}
  .tabs{display:flex;gap:6px;margin-left:auto}
  .tabs button{border:1px solid var(--line);background:#fff;padding:8px 14px;border-radius:9px;
       cursor:pointer;font-size:13.5px;color:var(--muted)}
  .tabs button.on{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:700}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow-x:auto;
       box-shadow:0 1px 3px rgba(15,23,42,.04);-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;min-width:640px}

  @media (max-width:640px){
    .wrap{padding:14px 12px 40px}
    header{padding:16px 18px}
    header h1{font-size:18px}
    .kpis{grid-template-columns:repeat(2,1fr);gap:10px}
    .toolbar{gap:8px}
    .toolbar input{min-width:0;flex:1 1 100%}
    .tabs{margin-left:0;width:100%}
    .tabs button{flex:1}
    .drawer{width:100%;max-width:100vw}
  }
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;white-space:nowrap}
  th{background:#f8fafc;color:var(--muted);font-weight:700;cursor:pointer;user-select:none;position:sticky;top:0}
  th:hover{color:var(--brand)}
  tbody tr:hover{background:#f8fbff}
  td.name{font-weight:700}
  .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:700}
  .p-done{background:#dcfce7;color:#15803d}
  .p-prog{background:#fef9c3;color:#a16207}
  .p-none{background:#fee2e2;color:#b91c1c}
  .mini{display:inline-flex;align-items:center;gap:8px}
  .mini .bar{width:90px;margin:0}
  .clickable{cursor:pointer}
  .muted{color:var(--muted)}
  .center{text-align:center}

  /* drawer */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;z-index:40}
  .overlay.show{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:560px;max-width:94vw;background:#fff;z-index:50;
       transform:translateX(100%);transition:transform .25s ease;box-shadow:-8px 0 30px rgba(15,23,42,.2);
       display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .drawer .dh{padding:18px 22px;border-bottom:1px solid var(--line);background:linear-gradient(120deg,#1e3a8a,#6d28d9);color:#fff}
  .drawer .dh h2{margin:0;font-size:19px}
  .drawer .dh .sub{font-size:12.5px;opacity:.85;margin-top:4px}
  .drawer .db{padding:18px 22px;overflow:auto}
  .drawer .x{position:absolute;top:16px;right:18px;color:#fff;font-size:22px;cursor:pointer;border:none;background:none}
  .stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat3 div{background:var(--soft);border-radius:10px;padding:10px;text-align:center}
  .stat3 .v{font-size:20px;font-weight:800}
  .stat3 .l{font-size:11.5px;color:var(--muted);margin-top:2px}
  .crow{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .crow .t{font-weight:700;font-size:13.5px}
  .crow .d{display:flex;justify-content:space-between;align-items:center;margin-top:6px;color:var(--muted);font-size:12px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>樂衍有限公司 · AI 學習儀表板</h1>
  <div class="meta" id="meta"></div>
</header>

<div class="wrap">
  <div class="kpis" id="kpis"></div>

  <div class="toolbar">
    <input id="q" placeholder="🔍 搜尋姓名 / 員工編號 / 課程">
    <select id="dept"></select>
    <select id="state">
      <option value="">全部達標狀態</option>
      <option value="none">尚未開始</option>
      <option value="prog">學習中(未達標)</option>
      <option value="done">已達標(滿15小時)</option>
    </select>
    <div class="tabs">
      <button data-tab="learner" class="on">依學員</button>
      <button data-tab="course">依課程</button>
      <button data-tab="record">明細</button>
    </div>
  </div>

  <div class="panel"><div id="view"></div></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="dh">
    <button class="x" id="closeDrawer">&times;</button>
    <h2 id="dName"></h2>
    <div class="sub" id="dSub"></div>
  </div>
  <div class="db" id="dBody"></div>
</div>

<footer id="foot"></footer>

/* ---------- 達標標準：每人累計學習滿 15 小時 ---------- */
const TARGET_HOURS = 15;
const TARGET_MIN = TARGET_HOURS * 60;   // 900 分鐘

/* ---------- 整理資料：以學員為核心 ---------- */
const recsByEmp = {};
DATA.records.forEach(r=>{ (recsByEmp[r.empId] ||= []).push(r); });

function hasValue(v){
  return v !== null && v !== undefined && String(v).trim() !== "";
}
function countsTowardHours(r){
  return hasValue(r.score) || hasValue(r.testTime);
}
function countedMin(r){
  if(!countsTowardHours(r)) return 0;
  const accumMin = r.accumMin || 0;
  const courseLen = r.courseLen || accumMin;
  return Math.min(accumMin, courseLen);
}
const excludedRecordCount = DATA.records.filter(r=>!countsTowardHours(r)).length;

function buildLearner(empId, name, account, recs){
  const totalMin = recs.reduce((s,r)=>s+countedMin(r),0);
  const progress = Math.min(totalMin / TARGET_MIN * 100, 100);  // 以 15 小時為 100%
  const done = recs.filter(r=>r.progress>=100).length;          // 逐課完成數（參考）
  const last = recs.map(r=>r.lastTime).filter(Boolean).sort().slice(-1)[0]||"";
  const state = totalMin===0 ? "none" : (totalMin>=TARGET_MIN ? "done" : "prog");
  return { empId, name, account, dept: DATA.empDept[empId]||"—",
           courses:recs.length, done, totalMin, progress, last, state, recs };
}

// 合併名冊（含沒有任何記錄的員工）與記錄
const learners = DATA.roster.map(p=> buildLearner(p.empId, p.name, p.account, recsByEmp[p.empId]||[]));
// 記錄中有、但名冊沒有的員工，也補進來
const rosterIds = new Set(DATA.roster.map(p=>p.empId));
Object.keys(recsByEmp).forEach(id=>{
  if(!rosterIds.has(id)) learners.push(buildLearner(id, recsByEmp[id][0].name, "", recsByEmp[id]));
});

/* ---------- 以課程為核心 ---------- */
const courseMap = {};
DATA.records.forEach(r=>{
  const c = courseMap[r.course] ||= {course:r.course, len:r.courseLen, learners:0, done:0, sum:0, scores:[], hasTest:false};
  c.learners++; c.sum+=r.progress;
  if(r.progress>=100) c.done++;
  if(r.score!=="" && !isNaN(+r.score)) c.scores.push(+r.score);
  if(countsTowardHours(r)) c.hasTest = true;
});
const courses = Object.values(courseMap).map(c=>({
  ...c, avg:c.sum/c.learners,
  avgScore: c.scores.length ? c.scores.reduce((a,b)=>a+b,0)/c.scores.length : null
}));

/* ---------- KPI ---------- */
const fmtMin = m => m>=60 ? (m/60).toFixed(1)+" 小時" : Math.round(m)+" 分";
const started = learners.filter(l=>l.totalMin>0).length;
const reached = learners.filter(l=>l.totalMin>=TARGET_MIN).length;   // 已達標滿15小時
const notStarted = learners.filter(l=>l.totalMin===0).length;
const totalMinAll = learners.reduce((s,l)=>s+l.totalMin,0);
const reachRate = Math.round(reached/learners.length*100);

document.getElementById('meta').textContent =
  `資料來源：${DATA.sourceFile}　|　${DATA.period||""}　|　達標標準：每人滿 ${TARGET_HOURS} 小時　|　產生時間：${DATA.generatedAt}`;

document.getElementById('kpis').innerHTML = [
  kpi(learners.length, "全體員工", `已開始學習 ${started} 人`),
  kpi(reached+" / "+learners.length, `已達標 ✓ 滿${TARGET_HOURS}小時`, `達標率 ${reachRate}%`, reachRate),
  kpi(learners.length-reached, "尚未達標人數", `其中 ${notStarted} 人尚未開始`),
  kpi(fmtMin(totalMinAll), "計入總學習時數", `已排除 ${excludedRecordCount} 筆未測驗紀錄`),
].join("");

function kpi(v,l,s,barPct){
  return `<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div>
    <div class="s">${s||""}</div>
    ${barPct!=null?`<div class="bar"><i style="width:${barPct}%"></i></div>`:""}</div>`;
}

/* ---------- 篩選器 ---------- */
const depts = [...new Set(learners.map(l=>l.dept))].filter(d=>d!=="—").sort();
document.getElementById('dept').innerHTML =
  `<option value="">全部部門</option>` + depts.map(d=>`<option>${d}</option>`).join("");

let tab="learner", sortKey="progress", sortDir=-1;
const $q=document.getElementById('q'), $dept=document.getElementById('dept'), $state=document.getElementById('state');
[$q,$dept,$state].forEach(el=>el.addEventListener('input',render));
document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); tab=b.dataset.tab;
  sortKey = tab==='course' ? 'learners' : 'progress'; sortDir=-1;
  render();
}));

function matchText(l){
  const q=$q.value.trim().toLowerCase(); if(!q) return true;
  return (l.name+" "+l.empId+" "+(l.recs?l.recs.map(r=>r.course).join(" "):(l.course||""))).toLowerCase().includes(q);
}

function progressPill(p){
  if(p>=100) return `<span class="pill p-done">已完成</span>`;
  if(p>0)    return `<span class="pill p-prog">${Math.round(p)}%</span>`;
  return `<span class="pill p-none">0%</span>`;
}
function statePill(s){
  return s==='done'?`<span class="pill p-done">已達標</span>`
    : s==='prog'?`<span class="pill p-prog">學習中</span>`
    : `<span class="pill p-none">尚未開始</span>`;
}
function miniBar(p){
  return `<span class="mini"><span class="bar" style="width:90px"><i style="width:${Math.min(p,100)}%"></i></span>
    <b>${Math.round(p)}%</b></span>`;
}

function sortRows(rows){
  rows.sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(typeof x==='string'){x=x||"";y=y||"";return sortDir*x.localeCompare(y,'zh-Hant');}
    return sortDir*((x||0)-(y||0));
  });
  return rows;
}
function th(key,label){
  const arrow = sortKey===key ? (sortDir<0?" ▼":" ▲") : "";
  return `<th data-k="${key}">${label}${arrow}</th>`;
}

function render(){
  const dq=$dept.value, sq=$state.value;
  if(tab==='learner') renderLearners(dq,sq);
  else if(tab==='course') renderCourses();
  else renderRecords(dq,sq);
  // sortable headers
  document.querySelectorAll('th[data-k]').forEach(t=>t.onclick=()=>{
    const k=t.dataset.k; if(sortKey===k) sortDir*=-1; else {sortKey=k;sortDir=-1;} render();
  });
}

function renderLearners(dq,sq){
  let rows = learners.filter(l=>(!dq||l.dept===dq)&&(!sq||l.state===sq)&&matchText(l));
  rows = sortRows(rows.slice());
  if(!rows.length){document.getElementById('view').innerHTML='<div class="empty">沒有符合條件的學員</div>';return;}
  document.getElementById('view').innerHTML = `<table>
    <thead><tr>
      ${th('name','姓名')}${th('empId','員工編號')}${th('dept','部門')}
      ${th('state','達標狀態')}${th('progress','達標進度(滿15h)')}${th('totalMin','學習時數 / 15h')}
      ${th('courses','學習課程數')}${th('done','完成課程')}${th('last','最後上課')}
    </tr></thead><tbody>
    ${rows.map(l=>`<tr class="clickable" data-emp="${l.empId}">
      <td class="name">${l.name}</td><td class="muted">${l.empId}</td><td>${l.dept}</td>
      <td>${statePill(l.state)}</td>
      <td>${l.totalMin?miniBar(l.progress):'<span class="muted">—</span>'}</td>
      <td>${l.totalMin?`<b>${(l.totalMin/60).toFixed(1)}</b> <span class="muted">/ 15 小時</span>`:'<span class="muted">—</span>'}</td>
      <td class="center">${l.courses}</td>
      <td class="center">${l.done}</td>
      <td class="muted">${l.last||'—'}</td>
    </tr>`).join("")}
    </tbody></table>`;
  document.querySelectorAll('tr[data-emp]').forEach(tr=>tr.onclick=()=>openLearner(tr.dataset.emp));
}

function renderCourses(){
  let rows = courses.filter(c=>{
    const q=$q.value.trim().toLowerCase();
    return !q || c.course.toLowerCase().includes(q);
  });
  rows = sortRows(rows.slice());
  if(!rows.length){document.getElementById('view').innerHTML='<div class="empty">沒有符合條件的課程</div>';return;}
  document.getElementById('view').innerHTML = `<table>
    <thead><tr>
      ${th('course','課程名稱')}${th('len','長度(分)')}${th('learners','學習人數')}
      ${th('done','完成人數')}${th('avg','平均進度')}${th('avgScore','平均測驗分')}${th('hasTest','計入時數')}
    </tr></thead><tbody>
    ${rows.map(c=>`<tr>
      <td class="name" style="white-space:normal;max-width:360px">${c.course}</td>
      <td class="center">${c.len||'—'}</td>
      <td class="center">${c.learners}</td>
      <td class="center">${c.done}</td>
      <td>${miniBar(c.avg)}</td>
      <td class="center">${c.avgScore!=null?c.avgScore.toFixed(0):'—'}</td>
      <td class="center">${c.hasTest?'<span class="pill p-done">是</span>':'<span class="pill p-none">否</span>'}</td>
    </tr>`).join("")}
    </tbody></table>`;
}

function renderRecords(dq,sq){
  const smap={none:0,prog:1,done:2};
  let rows = DATA.records.filter(r=>{
    if(dq && r.dept!==dq) return false;
    const q=$q.value.trim().toLowerCase();
    if(q && !(r.name+" "+r.empId+" "+r.course).toLowerCase().includes(q)) return false;
    if(sq){ const st = r.progress>=100?'done':(r.progress>0?'prog':'none'); if(st!==sq) return false; }
    return true;
  }).slice();
  rows = sortRows(rows);
  if(!rows.length){document.getElementById('view').innerHTML='<div class="empty">沒有符合條件的記錄</div>';return;}
  document.getElementById('view').innerHTML = `<table>
    <thead><tr>
      ${th('name','姓名')}${th('dept','部門')}${th('course','課程')}
      ${th('progress','進度')}${th('accumMin','學習時數(分)')}${th('score','測驗分')}${th('lastTime','最後上課')}
    </tr></thead><tbody>
    ${rows.map(r=>`<tr>
      <td class="name">${r.name}</td><td>${r.dept}</td>
      <td style="white-space:normal;max-width:320px">${r.course}</td>
      <td>${progressPill(r.progress)}</td>
      <td class="center">${r.accumMin||'—'}</td>
      <td class="center">${r.score||'—'}</td>
      <td class="muted">${r.lastTime||'—'}</td>
    </tr>`).join("")}
    </tbody></table>`;
}

/* ---------- 學員抽屜 ---------- */
const overlay=document.getElementById('overlay'), drawer=document.getElementById('drawer');
function closeDrawer(){drawer.classList.remove('show');overlay.classList.remove('show');}
overlay.onclick=closeDrawer; document.getElementById('closeDrawer').onclick=closeDrawer;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

function openLearner(empId){
  const l = learners.find(x=>x.empId===empId); if(!l) return;
  document.getElementById('dName').textContent = `${l.name}　${l.empId}`;
  document.getElementById('dSub').textContent = `${l.dept}${l.account?'　·　'+l.account:''}`;
  const recs = l.recs.slice().sort((a,b)=>b.progress-a.progress);
  const hrs = (l.totalMin/60).toFixed(1);
  const body = `
    <div style="background:var(--soft);border-radius:12px;padding:14px 16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <b style="font-size:14px">達標進度（目標 15 小時）</b>${statePill(l.state)}
      </div>
      <div class="bar" style="height:14px"><i style="width:${l.progress}%"></i></div>
      <div style="margin-top:8px;color:var(--muted);font-size:13px">
        已學習 <b style="color:var(--ink)">${hrs} 小時</b> / 15 小時　·　${Math.round(l.progress)}%
        ${l.totalMin<TARGET_MIN?`　·　還差 <b style="color:var(--bad)">${((TARGET_MIN-l.totalMin)/60).toFixed(1)} 小時</b>`:'　·　<b style="color:var(--ok)">已達標</b>'}
      </div>
    </div>
    <div class="stat3">
      <div><div class="v">${l.courses}</div><div class="l">學習課程</div></div>
      <div><div class="v">${l.done}</div><div class="l">完成課程</div></div>
      <div><div class="v">${hrs}</div><div class="l">學習時數(小時)</div></div>
    </div>
    ${recs.length? recs.map(r=>`
      <div class="crow">
        <div class="t">${r.course}</div>
        <div class="d">
          <span>${miniBar(r.progress)}</span>
          <span>學習 ${r.accumMin||0} 分${countsTowardHours(r)?`　·　計入 ${countedMin(r)} 分`:'　·　不列入達標時數'}${r.score!==""?`　·　測驗 ${r.score} 分`:""}</span>
        </div>
        <div class="d"><span class="muted">最後上課：${r.lastTime||'—'}</span>
          <span>${progressPill(r.progress)}</span></div>
      </div>`).join("")
      : `<div class="empty">此學員目前尚無任何學習記錄</div>`}
  `;
  document.getElementById('dBody').innerHTML = body;
  drawer.classList.add('show'); overlay.classList.add('show');
}

document.getElementById('foot').textContent =
  `共 ${learners.length} 位員工 · ${DATA.records.length} 筆學習記錄 · ${courses.length} 門課程　|　點選任一學員可查看完整課程明細`;

render();
</script>
</body>
</html>
